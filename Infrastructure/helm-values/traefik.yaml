deployment:
  replicas: 2

service:
  enabled: true
  type: LoadBalancer
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    # Update this with the actual security group ID after terraform apply
    # Run: terraform output load_balancer_security_group_id
    # service.beta.kubernetes.io/aws-load-balancer-security-groups: "sg-xxxxxxxxx"


ports:
  web:
    port: 80
    exposedPort: 80
  websecure:
    port: 443
    exposedPort: 443

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "300m"
    memory: "256Mi"

securityContext:
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: true
  runAsGroup: 65532
  runAsNonRoot: true
  runAsUser: 65532

logs:
  general:
    level: INFO
  access:
    enabled: true
